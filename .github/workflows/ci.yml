name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/build/.gradle
  GRADLE_OPTS: "-Xmx3072m"

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
          clean: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: build/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties', 'vendordeps/**') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compile
        run: ./gradlew :classes :testClasses

      - name: Stop Gradle daemon
        run: ./gradlew --stop
        if: always()

  checkstyle:
    runs-on: windows-latest
    needs: compile
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
          clean: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: build/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties', 'vendordeps/**') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Checkstyle
        run: ./gradlew :checkstyleMain :checkstyleTest

      - name: Stop Gradle daemon
        run: ./gradlew --stop
        if: always()

  test:
    runs-on: windows-latest
    needs: compile
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
          clean: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: build/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties', 'vendordeps/**') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Test
        run: ./gradlew :test

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: '**/TEST-*.xml'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Stop Gradle daemon
        run: ./gradlew --stop
        if: always()
